<body>
    <header><h1>Data Mangement App</h1></header>
    <main>
        <aside>
            <h2>Add A New Product</h2>
            <form method="post" class="productForm" id="productForm">
                <input class="productName" type="text" placeholder="Add a product name . . ." required>
                <input class="productPrice" type="number" step="0.01" placeholder="Add a product price . . ." required>
                <input class="productID" type="number" placeholder="Add a product ID . . ." required>
                <input type="submit" value="Create">
            </form>
            <form method="post" id="productForm" class="setForm">
                <output class="setNumber"></output>
                <input type="number" class="addNum" required>
                <div>
                    <button type="submit">Add</button> <button type="submit" class="deleteN">Delete</button>
                </div>
                <input type="submit" class="hasN" value="Has">
            </form>
        </aside>
        <figure></figure>
    </main>
    <script src="script.js"></script>
</body>
